name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: catnote_ai_test
          MYSQL_USER: bangcat_ai_test
          MYSQL_PASSWORD: test-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      AI_DATABASE_URL: mysql://bangcat_ai_test:test-password@127.0.0.1:3306/catnote_ai_test
      AI_DB_HOST: 127.0.0.1
      AI_DB_PORT: 3306
      AI_DB_USER: bangcat_ai_test
      AI_DB_PASSWORD: test-password
      AI_DB_NAME: catnote_ai_test
      SOURCE_DATABASE_URL: mysql://bangcat_ai_test:test-password@127.0.0.1:3306/catnote_ai_test
      SOURCE_DB_HOST: 127.0.0.1
      SOURCE_DB_PORT: 3306
      SOURCE_DB_USER: bangcat_ai_test
      SOURCE_DB_PASSWORD: test-password
      SOURCE_DB_NAME: catnote_ai_test
      SOURCE_DB_REQUIRED: "false"
      REDIS_URL: redis://127.0.0.1:6379/0
      INTERNAL_SERVICE_TOKEN: ci-test-token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund
      - name: Repository policy
        run: npm run policy:check
      - name: Validate AI Prisma schema
        run: npx prisma validate --schema prisma/ai/schema.prisma
      - name: Validate source Prisma schema
        run: npx prisma validate --schema prisma/source/schema.prisma
      - name: Typecheck
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log
      - name: Upload typecheck diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error
          retention-days: 14
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build

  migration-safety:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: catnote_ai_test
          MYSQL_USER: bangcat_ai_test
          MYSQL_PASSWORD: test-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      AI_DATABASE_URL: mysql://bangcat_ai_test:test-password@127.0.0.1:3306/catnote_ai_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Require committed reviewed migrations
        run: |
          if [ ! -d prisma/ai/migrations ] || ! find prisma/ai/migrations -type f -name '*.sql' | grep -q .; then
            echo 'No production migration committed; deployment remains blocked by the migration gate.'
            exit 1
          fi
          find prisma/ai/migrations -type f -name '*.sql' -print
      - name: Allow migration test databases for the CI account
        run: |
          mysql -h 127.0.0.1 -P 3306 -uroot -proot -e \
            "GRANT ALL PRIVILEGES ON \`catnote_ai_test%\`.* TO 'bangcat_ai_test'@'%'; FLUSH PRIVILEGES;"
      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund
      - name: Generate Prisma clients
        run: npm run prisma:generate
      - name: Apply committed migrations to a scratch database
        run: npx prisma migrate deploy
      - name: Detect unreviewed drift between schema and committed migrations
        run: |
          npx prisma migrate diff \
            --from-config-datasource \
            --to-schema prisma/ai/schema.prisma \
            --script \
            --exit-code
      - name: Run migration integration tests
        run: npm run test:migration
