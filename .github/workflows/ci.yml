name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: catnote_ai_test
          MYSQL_USER: bangcat_ai_test
          MYSQL_PASSWORD: test-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      AI_DATABASE_URL: mysql://bangcat_ai_test:test-password@127.0.0.1:3306/catnote_ai_test
      AI_DB_HOST: 127.0.0.1
      AI_DB_PORT: 3306
      AI_DB_USER: bangcat_ai_test
      AI_DB_PASSWORD: test-password
      AI_DB_NAME: catnote_ai_test
      SOURCE_DATABASE_URL: mysql://bangcat_ai_test:test-password@127.0.0.1:3306/catnote_ai_test
      SOURCE_DB_HOST: 127.0.0.1
      SOURCE_DB_PORT: 3306
      SOURCE_DB_USER: bangcat_ai_test
      SOURCE_DB_PASSWORD: test-password
      SOURCE_DB_NAME: catnote_ai_test
      SOURCE_DB_REQUIRED: "false"
      REDIS_URL: redis://127.0.0.1:6379/0
      INTERNAL_SERVICE_TOKEN: ci-test-token
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi
      - name: Commit dependency lock when first generated
        if: github.event_name == 'pull_request'
        run: |
          if [ -n "$(git status --porcelain -- package-lock.json)" ]; then
            git config user.name "bangcat-ci"
            git config user.email "actions@users.noreply.github.com"
            git add package-lock.json
            git commit -m "chore: lock production dependencies"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Repository policy
        run: npm run policy:check
      - name: Validate AI Prisma schema
        run: npx prisma validate --schema prisma/ai/schema.prisma
      - name: Validate source Prisma schema
        run: npx prisma validate --schema prisma/source/schema.prisma
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build

  migration-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Require reviewed migrations before production deploy
        run: |
          if [ -d prisma/ai/migrations ]; then
            find prisma/ai/migrations -type f -name '*.sql' -print
          else
            echo 'No production migration committed yet; deployment remains blocked by the migration gate.'
          fi
